name: Reusable - Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name (e.g., username/repo)"
        required: true
        type: string
      dockerfile-path:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      registry:
        description: "Container registry (dockerhub or gcr)"
        required: false
        type: string
        default: "dockerhub"
      gcp-region:
        description: "GCP region for Artifact Registry"
        required: false
        type: string
        default: "us-central1"
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      GCP_SA_KEY:
        required: false
      GCP_PROJECT_ID:
        required: false
    outputs:
      image-tag:
        description: "The full image tag that was pushed"
        value: ${{ jobs.build-push.outputs.image-tag }}
      image-digest:
        description: "The image digest"
        value: ${{ jobs.build-push.outputs.digest }}

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.primary-tag.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract Primary Tag
        id: primary-tag
        run: |
          echo "Full tags from metadata-action:"
          echo "${{ steps.meta.outputs.tags }}"
          
          # First, look for a tag with sha-
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep ":sha-" | head -n 1)
          
          # Fallback to the first non-empty line if no sha tag found
          if [ -z "$TAG" ]; then
            TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep . | head -n 1)
          fi
          
          if [ -z "$TAG" ]; then
            echo "Error: No tags generated by metadata-action"
            exit 1
          fi
          
          echo "Extracted primary tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # --- DockerHub Login ---
      - name: Login to Docker Hub
        if: inputs.registry == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- GCP Artifact Registry Login ---
      - name: Authenticate to Google Cloud
        if: inputs.registry == 'gcr'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCP
        if: inputs.registry == 'gcr'
        run: gcloud auth configure-docker ${{ inputs.gcp-region }}-docker.pkg.dev --quiet

      # --- Build & Push ---
      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Image Summary
        run: |
          echo "## Docker Image Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ inputs.image-name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
