name: Reusable - Deploy to Kubernetes (GKE + Helm)

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment (staging or production)"
        required: true
        type: string
      helm-release-name:
        description: "Helm release name"
        required: true
        type: string
      helm-chart-path:
        description: "Path to the Helm chart"
        required: false
        type: string
        default: "./helm/ml-app"
      image-tag:
        description: "Docker image tag to deploy"
        required: true
        type: string
      gke-cluster:
        description: "GKE cluster name"
        required: false
        type: string
        default: "ml-cluster"
      gke-zone:
        description: "GKE cluster zone"
        required: false
        type: string
        default: "us-central1-a"
      replicas:
        description: "Number of pod replicas"
        required: false
        type: string
        default: "2"
    secrets:
      GCP_SA_KEY:
        required: true
      GCP_PROJECT_ID:
        required: true
    outputs:
      deploy-status:
        description: "Deployment status"
        value: ${{ jobs.deploy.outputs.status }}

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      status: ${{ steps.helm-deploy.outcome }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ inputs.gke-cluster }}
          location: ${{ inputs.gke-zone }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Set Kubernetes Namespace
        id: namespace
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            echo "namespace=ml-production" >> $GITHUB_OUTPUT
          else
            echo "namespace=ml-staging" >> $GITHUB_OUTPUT
          fi

      - name: Create Namespace if Not Exists
        run: |
          kubectl create namespace ${{ steps.namespace.outputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm Deploy
        id: helm-deploy
        run: |
          echo "Deploying ${{ inputs.helm-release-name }} to ${{ inputs.environment }}..."
          helm upgrade --install ${{ inputs.helm-release-name }} ${{ inputs.helm-chart-path }} \
            --namespace ${{ steps.namespace.outputs.namespace }} \
            --set image.tag=${{ inputs.image-tag }} \
            --set replicaCount=${{ inputs.replicas }} \
            --set environment=${{ inputs.environment }} \
            --values ${{ inputs.helm-chart-path }}/values-${{ inputs.environment }}.yaml \
            --wait \
            --timeout 5m \
            --atomic

      - name: Verify Deployment
        run: |
          echo "Verifying deployment rollout..."
          kubectl rollout status deployment/${{ inputs.helm-release-name }} \
            -n ${{ steps.namespace.outputs.namespace }} \
            --timeout=5m
          echo "Pods running:"
          kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.helm-release-name }}

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** ${{ steps.namespace.outputs.namespace }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ inputs.helm-release-name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ inputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.helm-deploy.outcome }}" >> $GITHUB_STEP_SUMMARY
