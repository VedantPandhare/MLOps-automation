name: Reusable - Security Scan (Trivy)

on:
  workflow_call:
    inputs:
      image-ref:
        description: "Docker image reference to scan"
        required: true
        type: string
      severity:
        description: "Severity levels to fail on (CRITICAL,HIGH,MEDIUM,LOW)"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      exit-code:
        description: "Exit code when vulnerabilities found (0=pass, 1=fail)"
        required: false
        type: string
        default: "1"
    outputs:
      scan-status:
        description: "Result of the security scan"
        value: ${{ jobs.security-scan.outputs.status }}

jobs:
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.scan.outcome }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        id: scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image-ref }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: ${{ inputs.severity }}
          exit-code: ${{ inputs.exit-code }}
          ignore-unfixed: true

      - name: Run Trivy for Summary Report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ inputs.image-ref }}
          format: "table"
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

      - name: Security Scan Summary
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ inputs.image-ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Severity Filter:** ${{ inputs.severity }}" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Status:** ${{ steps.scan.outcome }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.scan.outcome }}" == "failure" ]; then
            echo "❌ **FAILED** - HIGH/CRITICAL vulnerabilities found. Pipeline blocked." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **PASSED** - No blocking vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi
